<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <rect width="800" height="500" fill="#f0fdfa"/>
  <rect width="800" height="500" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d9488" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <!-- Mountains -->
  <polygon points="150,380 280,200 410,380" fill="#0d9488" opacity="0.25"/>
  <polygon points="280,380 420,220 560,380" fill="#0d9488" opacity="0.35"/>
  <polygon points="440,380 560,240 680,380" fill="#0d9488" opacity="0.2"/>
  <!-- Sun -->
  <circle cx="620" cy="140" r="55" fill="#f59e0b" opacity="0.3"/>
  <!-- Ground -->
  <rect x="0" y="370" width="800" height="130" fill="#0d9488" opacity="0.12"/>
  <!-- Map pin -->
  <g transform="translate(380, 150)">
    <circle cx="20" cy="20" r="20" fill="#0d9488" opacity="0.9"/>
    <circle cx="20" cy="20" r="8" fill="white"/>
    <path d="M20 40 L20 58" stroke="#0d9488" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  </g>
</svg>
